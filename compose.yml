services:
  public-transport-web-api:
    image: ghcr.io/yandrik/public-transport-web-api:latest
    build:
      context: .
    ports:
      - "${APP_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      PROVIDER_DEFAULT: ${PROVIDER_DEFAULT:-Kvv}
      PROVIDERKEY_BVG: ${PROVIDERKEY_BVG:-}
      PROVIDERKEY_VBB: ${PROVIDERKEY_VBB:-}
      PROVIDERKEY_AVV_AUGSBURG: ${PROVIDERKEY_AVV_AUGSBURG:-}
      THINGSPEAK_KEY: ${THINGSPEAK_KEY:-}
      THINGSPEAK_CHANNEL: ${THINGSPEAK_CHANNEL:-field1}
      JAVA_OPTS: ${JAVA_OPTS:-}
